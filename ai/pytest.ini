[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests that call real external APIs (Gemini, Groq, image providers)
    unit: marks tests that run offline with no external calls
addopts = -v --tb=short --strict-markers
timeout = 120
log_cli = true
log_cli_level = INFO